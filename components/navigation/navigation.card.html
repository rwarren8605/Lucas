<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 24px; background: var(--surface-background); }
  .stack { display: flex; flex-direction: column; gap: 16px; max-width: 390px; }
  .frame { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-card); background: var(--surface-primary); }
  .label { font-family: var(--font-ui); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--color-gray-500); margin: 4px 0 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { HeaderNav, Tabs, PaginationDots, MobileFooter, Button, IconButton } = window.LUCASDesignSystem_675758;
  function Demo() {
    const [tab, setTab] = React.useState("Modules");
    const [dot, setDot] = React.useState(1);
    return (
      <div className="stack">
        <div className="frame">
          <HeaderNav title="Module 5 of 5" onBack={()=>{}} trailing={<IconButton icon="more_horiz" type="ghost" />} />
        </div>
        <div className="frame">
          <HeaderNav tone="brand" title="Module 5 of 5" onBack={()=>{}} />
        </div>
        <p className="label">Tabs</p>
        <Tabs tabs={["Overview","Modules","Resources"]} value={tab} onChange={setTab} />
        <p className="label">Pagination dots</p>
        <PaginationDots count={4} active={dot} onDotClick={setDot} />
        <p className="label">Mobile footer</p>
        <div className="frame">
          <MobileFooter
            primary={<Button type="primary" fullWidth>Continue</Button>}
            secondary={<Button type="secondary" fullWidth>Maybe Later</Button>}
          />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
