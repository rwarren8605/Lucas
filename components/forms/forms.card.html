<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 24px; background: var(--surface-background); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .label { font-family: var(--font-ui); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--color-gray-500); margin: 0 0 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Checkbox, RadioButton, SegmentedControl } = window.LUCASDesignSystem_675758;
  function Demo() {
    const [tab, setTab] = React.useState("Week");
    const [pick, setPick] = React.useState("a");
    const [agree, setAgree] = React.useState(true);
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Label" placeholder="Enter Password" />
          <Input label="Label" value="hunter2" state="active" type="password" />
          <Input label="Label" state="error" value="abc" helperText="Password must be 8+ characters" />
        </div>
        <div className="stack">
          <Input label="Region" placeholder="Select a state" dropdown />
          <Input label="Message" placeholder="How can we help you?" multiline />
        </div>
        <div className="stack">
          <p className="label">Selection</p>
          <Checkbox checked={agree} label="I agree to the terms" onChange={setAgree} />
          <Checkbox checked={false} label="Email me updates" onChange={() => {}} />
          <RadioButton checked={pick==="a"} label="Length of credit history" onChange={() => setPick("a")} />
          <RadioButton checked={pick==="b"} label="Payment history" onChange={() => setPick("b")} />
          <RadioButton error label="This option errored" onChange={() => {}} />
        </div>
        <div className="stack">
          <p className="label">Segmented control</p>
          <SegmentedControl options={["Day","Week","Month"]} value={tab} onChange={setTab} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
