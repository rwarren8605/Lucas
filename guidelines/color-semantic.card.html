<!-- @dsCard group="Colors" viewport="700x180" name="Semantic — Success / Error / Warning" subtitle="Green, red & orange for states" -->
<!DOCTYPE html><html><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--surface-elevated); font-family:var(--font-ui); }
  .grp { margin-bottom:12px; }
  .gl { font-size:11px; font-weight:600; color:var(--color-gray-700); margin-bottom:6px; }
  .row { display:flex; gap:6px; }
  .sw { flex:1; display:flex; flex-direction:column; gap:4px; }
  .chip { height:34px; border-radius:8px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .n { font-size:9px; color:var(--color-gray-500); }
</style></head><body>
<div id="r"></div>
<script>
  const families = {
    "Green · success": "green",
    "Red · error": "red",
    "Orange · warning": "orange",
  };
  const steps = ["50","100","300","500","700","900"];
  const cs = getComputedStyle(document.documentElement);
  document.getElementById('r').innerHTML = Object.entries(families).map(([label,fam])=>{
    const chips = steps.map(s=>{
      const v = cs.getPropertyValue(`--color-${fam}-${s}`).trim();
      return `<div class="sw"><div class="chip" style="background:${v}"></div><div class="n">${fam}/${s}</div></div>`;
    }).join('');
    return `<div class="grp"><div class="gl">${label}</div><div class="row">${chips}</div></div>`;
  }).join('');
</script>
</body></html>
