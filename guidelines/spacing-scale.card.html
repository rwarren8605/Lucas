<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4pt grid — 2xs → 4xl" -->
<!DOCTYPE html><html><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-elevated); font-family:var(--font-ui); }
  .row { display:flex; align-items:flex-end; gap:16px; }
  .sw { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background:var(--color-brand-500); border-radius:3px; width:18px; }
  .n { font-size:10px; color:var(--color-gray-600); }
  .v { font-size:9px; color:var(--color-gray-400); }
</style></head><body>
<div class="row">
  <div class="sw"><div class="bar" style="height:4px"></div><div class="n">2xs</div><div class="v">4</div></div>
  <div class="sw"><div class="bar" style="height:8px"></div><div class="n">xs</div><div class="v">8</div></div>
  <div class="sw"><div class="bar" style="height:12px"></div><div class="n">sm</div><div class="v">12</div></div>
  <div class="sw"><div class="bar" style="height:16px"></div><div class="n">md</div><div class="v">16</div></div>
  <div class="sw"><div class="bar" style="height:20px"></div><div class="n">lg</div><div class="v">20</div></div>
  <div class="sw"><div class="bar" style="height:24px"></div><div class="n">xl</div><div class="v">24</div></div>
  <div class="sw"><div class="bar" style="height:32px"></div><div class="n">2xl</div><div class="v">32</div></div>
  <div class="sw"><div class="bar" style="height:40px"></div><div class="n">3xl</div><div class="v">40</div></div>
  <div class="sw"><div class="bar" style="height:60px"></div><div class="n">4xl</div><div class="v">60</div></div>
</div>
</body></html>
